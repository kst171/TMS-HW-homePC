services:
  db:
    image: postgres:latest
    container_name: postgres_db_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: user        # Имя пользователя базы
      POSTGRES_PASSWORD: password # Пароль базы
      POSTGRES_DB: mydb          # Имя базы данных по умолчанию
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"              # Проброс порта хоста на порт контейнера
    volumes:
      - db_data:/var/lib/postgresql/data # Постоянное хранение данных

  web: 
    image: nginx:latest
    container_name: nginx_web_container
    restart: unless-stopped
    ports:
      - "8088:80" # Проброс стандартного HTTP-порта
    volumes:
      # Монтируем в conf.d/default.conf
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro 
    depends_on:
      - db # Очередность запуска: сначала база, затем веб-сервер
    links:
      - db:database_host # Создает ссылку на сервис db с алиасом database_host   

volumes:
  db_data: # Определение именованного тома

