apiVersion: v1
kind: Service
metadata:
  name: web-clusterip
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80         # Порт самого сервиса внутри кластера
    targetPort: 80   # Порт контейнера в поде
---
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: dev
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32000  # Фиксированный внешний порт на ноде
---
apiVersion: v1
kind: Service
metadata:
  name: web-loadbalancer
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
