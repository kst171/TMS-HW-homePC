apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager-role
  namespace: dev
rules:
- apiGroups: [""] 
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"] # Чтение и запись (без права создания и удаления)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rbac-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: app-service-account
  namespace: dev
roleRef:
  kind: Role
  name: pod-manager-role
  apiGroup: rbac.authorization.k8s.io
