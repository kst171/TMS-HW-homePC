apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx-web
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
